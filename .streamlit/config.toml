[theme]
base = "dark"
primaryColor = "#7C6CF0"
backgroundColor = "#0B0D12"
secondaryBackgroundColor = "#151823"
textColor = "#E6E9F0"
linkColor = "#98A7F8"
borderColor = "#232839"
baseRadius = "0.75rem"
font = "Inter, -apple-system, 'Segoe UI', sans-serif"
